<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Conta Check Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Operations Dashboard</p>
        <div id="archive-summary" class="archive-summary" aria-live="polite">Loading archive directory summary...</div>
      </div>
    </header>

    <section class="toolbar-panel">
      <form id="mongodb-config-form" class="mongodb-config-panel">
        <div class="mongodb-config-copy">
          <p class="mongodb-config-label">MongoDB Connection</p>
          <p id="mongodb-db-name" class="mongodb-config-db-name">Loading DB configuration...</p>
        </div>
        <div class="mongodb-config-controls">
          <input id="mongodb-url" class="mongodb-config-input" type="text" spellcheck="false" autocomplete="off" placeholder="mongodb://host:27017" aria-label="MongoDB connection string">
          <button id="mongodb-apply-button" type="submit" class="mongodb-config-button">Apply DB Connection</button>
        </div>
        <p id="mongodb-config-status" class="mongodb-config-status" aria-live="polite"></p>
      </form>
      <div id="tabs" class="tabs" aria-label="Sections">
        <button data-type="main" class="tab active">Main Docs</button>
        <button data-type="extractentries" class="tab">Extract Entries</button>
        <button data-type="periodic" class="tab">Periodic Invoices</button>
        <button data-type="support" class="tab">Support Docs</button>
        <button data-type="investment" class="tab">Investment Docs</button>
        <button data-type="annual" class="tab">Annual Reports</button>
        <button data-type="totals" class="tab">Totals</button>
      </div>
    </section>

    <main id="app" class="app-content">Loading...</main>
  </div>
  <script src="app.js"></script>
</body>
</html>
